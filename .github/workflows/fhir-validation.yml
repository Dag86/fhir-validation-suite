name: FHIR R4 Validation Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run Karate test suite
        run: mvn test -B

      - name: Upload Karate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-report
          path: target/karate-reports/

      - name: Upload captured FHIR responses
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fhir-responses
          path: target/responses/

      - name: Download HL7 FHIR Validator
        run: |
          curl -L https://github.com/hapifhir/org.hl7.fhir.core/releases/download/6.4.0/validator_cli.jar \
            -o validator_cli.jar

      - name: Run HL7 FHIR Validator scan
        run: |
          find target/responses -name "*.json" -print0 | \
          xargs -0 java -jar validator_cli.jar \
            -version 4.0.1 \
            -output target/fhir-validation-report.json \
            || true

      - name: Upload FHIR validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fhir-validation-report
          path: target/fhir-validation-report.json
